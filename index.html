<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="视频转音频">
  <meta name="theme-color" content="#1a1a2e">
  <title>视频转音频 - MP3 / WAV</title>
  <script src="lame.min.js"></script>

  <style>
    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --primary: #7c5cfc;
      --primary-glow: rgba(124, 92, 252, 0.35);
      --success: #34d399;
      --danger: #f87171;
      --warn: #fbbf24;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: #2d2d4a;
      --radius: 18px;
      --radius-sm: 12px;
      --safe-bottom: env(safe-area-inset-bottom, 16px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px;
      padding-bottom: calc(20px + var(--safe-bottom));
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124, 92, 252, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(52, 211, 153, 0.05) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── header ── */
    .header {
      position: relative; z-index: 1; text-align: center;
      margin-bottom: 28px; margin-top: 12px;
    }
    .logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--primary), #a78bfa);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px; font-size: 30px;
      box-shadow: 0 8px 28px var(--primary-glow);
    }
    .header h1 {
      font-size: 22px; font-weight: 700; letter-spacing: -0.3px;
      background: linear-gradient(135deg, #e2e8f0, #c4b5fd);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    /* ── card ── */
    .card {
      position: relative; z-index: 1;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 18px;
      width: 100%; max-width: 440px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }

    /* ── drop zone ── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 28px 16px; text-align: center; cursor: pointer;
      transition: all 0.25s ease;
      background: rgba(255,255,255,0.02);
    }
    .drop-zone:hover, .drop-zone.active {
      border-color: var(--primary);
      background: rgba(124, 92, 252, 0.06);
      box-shadow: 0 0 20px rgba(124, 92, 252, 0.10);
    }
    .drop-zone.dragover {
      border-color: var(--success);
      background: rgba(52, 211, 153, 0.06);
      box-shadow: 0 0 20px rgba(52, 211, 153, 0.15);
      transform: scale(1.02);
    }
    .drop-icon { font-size: 40px; margin-bottom: 8px; opacity: 0.9; }
    .drop-zone .title { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .drop-zone .hint { font-size: 12px; color: var(--text-muted); }
    .hidden-input { display: none; }

    /* ── file list area ── */
    .file-list-wrap {
      display: none;
      margin-top: 14px;
      animation: fadeIn 0.3s ease;
    }
    .file-list-wrap.show { display: block; }

    .file-list-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px; font-size: 13px; color: var(--text-muted);
    }
    .file-list-header .count { font-weight: 600; }
    .file-list-actions { display: flex; gap: 8px; }
    .link-btn {
      background: none; border: none; color: var(--primary);
      font-size: 13px; cursor: pointer; padding: 4px 0;
      font-weight: 500;
    }
    .link-btn.danger { color: var(--danger); }

    .file-list {
      max-height: 280px; overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      -webkit-overflow-scrolling: touch;
    }

    .file-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13px;
      transition: background 0.2s;
    }
    .file-item:last-child { border-bottom: none; }
    .file-item.status-done { background: rgba(52, 211, 153, 0.05); }
    .file-item.status-error { background: rgba(248, 113, 113, 0.05); }
    .file-item.status-processing { background: rgba(124, 92, 252, 0.06); }

    .file-item .fi-status {
      font-size: 20px; flex-shrink: 0; width: 28px; text-align: center;
    }
    .file-item .fi-info { flex: 1; min-width: 0; }
    .file-item .fi-name {
      font-weight: 600; font-size: 13px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-item .fi-meta {
      font-size: 11px; color: var(--text-muted); margin-top: 1px;
    }
    .file-item .fi-actions { flex-shrink: 0; display: flex; gap: 6px; align-items: center; }

    /* ── rename input ── */
    .rename-row {
      display: flex; align-items: center; gap: 6px;
      margin-top: 6px;
      padding: 6px 8px;
      background: rgba(124, 92, 252, 0.06);
      border: 1px dashed rgba(124, 92, 252, 0.3);
      border-radius: 8px;
    }
    .rename-label {
      font-size: 12px;
      color: var(--primary);
      white-space: nowrap;
      font-weight: 500;
      flex-shrink: 0;
    }
    .rename-input {
      flex: 1;
      padding: 5px 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      outline: none;
      transition: all 0.2s;
      min-width: 0;
    }
    .rename-input:hover {
      border-color: var(--primary);
      background: rgba(124, 92, 252, 0.1);
    }
    .rename-input:focus {
      border-color: var(--primary);
      background: rgba(124, 92, 252, 0.12);
      box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.15);
    }

    /* ── format selector ── */
    .format-selector {
      display: flex; gap: 0;
      margin-top: 14px;
    }
    .format-option {
      flex: 1;
      padding: 10px 16px;
      text-align: center;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text-muted);
      transition: all 0.2s;
      position: relative;
    }
    .format-option:first-child {
      border-radius: var(--radius-sm) 0 0 var(--radius-sm);
    }
    .format-option:last-child {
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .format-option.active {
      color: #fff;
      background: rgba(124, 92, 252, 0.25);
      border-color: var(--primary);
      z-index: 1;
    }
    .format-option .fmt-badge {
      display: block;
      font-size: 9px;
      font-weight: 400;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .format-option.active .fmt-badge { color: var(--primary); }

    .icon-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .icon-btn:hover { color: #fff; border-color: #fff; }
    .icon-btn.download { color: var(--success); border-color: var(--success); }
    .icon-btn.download:hover { background: var(--success); color: #000; }
    .icon-btn.remove:hover { color: var(--danger); border-color: var(--danger); }

    .download-spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(124, 92, 252, 0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── buttons ── */
    .btn {
      display: block; width: 100%;
      padding: 14px 24px;
      border: none; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.2px; margin-top: 14px;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      color: #fff;
      box-shadow: 0 4px 14px var(--primary-glow);
    }
    .btn-primary:hover {
      box-shadow: 0 6px 20px rgba(124, 92, 252, 0.5);
      transform: translateY(-1px);
    }
    .btn-primary:disabled {
      background: #3a3a5c; color: #6b6b8a;
      box-shadow: none; cursor: not-allowed; transform: none;
    }

    .btn-outline {
      background: transparent; border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { background: rgba(255,255,255,0.04); }

    /* ── per-file progress ── */
    .fi-progress {
      height: 3px;
      background: var(--border);
      border-radius: 99px; overflow: hidden;
      margin-top: 3px;
    }
    .fi-progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--primary), var(--success));
      border-radius: 99px;
      transition: width 0.35s ease;
    }
    .fi-status-text {
      font-size: 11px; color: var(--primary); margin-top: 2px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* ── toast ── */
    .toast {
      display: none;
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      padding: 10px 18px; border-radius: 99px;
      font-size: 13px; font-weight: 500; color: #fff;
      z-index: 100;
      animation: slideDown 0.35s ease;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
      max-width: 88vw; text-align: center;
    }
    .toast.show { display: block; }
    .toast.error { background: var(--danger); }
    .toast.info { background: var(--primary); }

    /* ── animations ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .loading-text { animation: pulse 1.2s ease-in-out infinite; }

    /* ── footer ── */
    .footer {
      position: relative; z-index: 1;
      margin-top: 24px; font-size: 11px;
      color: var(--text-muted); text-align: center;
    }
  </style>
</head>
<body>

  <div class="toast" id="toast"></div>

  <div class="header">
    <div class="logo">🎵</div>
    <h1>视频转音频</h1>
    <p>从视频中提取音频 · 支持 MP3 / WAV · 批量转换</p>
  </div>

  <div class="card">
    <!-- Drop Zone -->
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon" id="dropIcon">📁</div>
      <div class="title" id="dropTitle">点击选择 MP4 文件（支持多选）</div>
      <div class="hint" id="dropHint">或将文件拖拽到此处</div>
      <input type="file" accept="video/mp4,video/*,.mp4" class="hidden-input" id="fileInput" multiple>
    </div>

    <!-- File List -->
    <div class="file-list-wrap" id="fileListWrap">
      <div class="file-list-header">
        <span class="count" id="listCount">0 个文件</span>
        <div class="file-list-actions">
          <button class="link-btn" id="btnAddMore">+ 添加更多</button>
          <button class="link-btn danger" id="btnClearAll">清除全部</button>
        </div>
      </div>
      <div class="file-list" id="fileList"></div>
    </div>

    <!-- Format Selector -->
    <div class="format-selector" id="formatSelector">
      <button class="format-option active" data-format="mp3">
        🎵 MP3<span class="fmt-badge">默认 · 体积小</span>
      </button>
      <button class="format-option" data-format="wav">
        🎼 WAV<span class="fmt-badge">无损 · 音质佳</span>
      </button>
    </div>

    <!-- Convert Button -->
    <button class="btn btn-primary" id="btnConvert" disabled>
      开始转换
    </button>
  </div>

  <div class="footer">
    完全在本地处理 · 文件不会上传到任何服务器
    <br>支持 MP3（有损压缩）与 WAV（无损）格式
  </div>

  <script>
    (function () {
      // ─── DOM refs ───
      const dropZone    = document.getElementById('dropZone');
      const dropIcon    = document.getElementById('dropIcon');
      const dropTitle   = document.getElementById('dropTitle');
      const dropHint    = document.getElementById('dropHint');
      const fileInput   = document.getElementById('fileInput');
      const fileListWrap = document.getElementById('fileListWrap');
      const listCount   = document.getElementById('listCount');
      const fileList    = document.getElementById('fileList');
      const btnAddMore  = document.getElementById('btnAddMore');
      const btnClearAll = document.getElementById('btnClearAll');
      const btnConvert  = document.getElementById('btnConvert');
      const toast       = document.getElementById('toast');

      // ─── State ───
      let files = [];      // { id, file, status: 'pending'|'processing'|'done'|'error', mp3Blob, error }
      let isConverting = false;
      let outputFormat = 'mp3';  // 'mp3' | 'wav'
      let idCounter = 0;

      // Status icons
      const STATUS_ICON = {
        pending:    '⏳',
        processing: '🔄',
        done:       '✅',
        error:      '❌',
      };

      // ─── Toast ───
      let toastTimer;
      function showToast(msg, type = 'info') {
        toast.textContent = msg;
        toast.className = 'toast ' + type + ' show';
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2600);
      }

      // ─── Format bytes ───
      function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
      }

      // ─── Add files ───
      function addFiles(newFiles) {
        let added = 0;
        for (const file of newFiles) {
          if (!file) continue;
          const isVideo = file.type.startsWith('video/') || file.name.toLowerCase().endsWith('.mp4');
          if (!isVideo) continue;

          // Dedup by name + size
          const dup = files.find(f => f.file.name === file.name && f.file.size === file.size);
          if (dup) continue;

          files.push({
            id: ++idCounter,
            file: file,
            status: 'pending',
            mp3Blob: null,
            error: null,
            convertedFormat: null,
            progress: 0,
            progressText: '',
            outputName: file.name.replace(/\.(mp4|mov|mkv|avi|webm|flv|wmv)$/i, '') + '.' + outputFormat,
          });
          added++;
        }

        if (added > 0) {
          renderFileList();
          updateDropZone();
          showToast(`已添加 ${added} 个文件`, 'info');
        } else if (newFiles.length > 0) {
          showToast('文件已存在或格式不支持', 'info');
        }

        fileInput.value = '';
      }

      // ─── Remove a single file ───
      function removeFile(id) {
        if (isConverting) return;
        files = files.filter(f => f.id !== id);
        renderFileList();
        updateDropZone();
      }

      // ─── Clear all ───
      function clearAll() {
        if (isConverting) return;
        files = [];
        renderFileList();
        updateDropZone();
      }

      // ─── Update drop zone appearance ───
      function updateDropZone() {
        // Drop zone stays clean — all status is in the file list
        const pendingCount = files.filter(f => f.status === 'pending' || f.status === 'error').length;
        btnConvert.disabled = (pendingCount === 0 || isConverting);
        if (pendingCount > 0) {
          const fmtLabel = outputFormat === 'wav' ? 'WAV' : 'MP3';
          btnConvert.textContent = `🎵 转为 ${fmtLabel}（${pendingCount} 个文件）`;
        } else {
          btnConvert.textContent = '开始转换';
        }
      }

      // ─── Render file list ───
      function renderFileList() {
        if (files.length === 0) {
          fileListWrap.classList.remove('show');
          return;
        }

        fileListWrap.classList.add('show');

        const doneCount = files.filter(f => f.status === 'done').length;
        const total = files.length;
        listCount.textContent = `${total} 个文件` + (doneCount > 0 ? `（${doneCount} 已完成）` : '');

        fileList.innerHTML = files.map(f => {
          let metaHtml = formatBytes(f.file.size);
          let actionHtml = '';

          if (f.status === 'done' && f.mp3Blob) {
            const fmt = f.convertedFormat || 'mp3';
            metaHtml += ` → ${formatBytes(f.mp3Blob.size)} ${fmt.toUpperCase()}`;
            actionHtml = `<button class="icon-btn download" data-action="download" data-id="${f.id}" title="下载">📥</button>`;
          } else if (f.status === 'error') {
            metaHtml += ` · ${f.error}`;
          }

          const canRemove = !isConverting && (f.status === 'pending' || f.status === 'error' || f.status === 'done');
          if (canRemove) {
            actionHtml += `<button class="icon-btn remove" data-action="remove" data-id="${f.id}" title="移除">✕</button>`;
          }

          if (f.status === 'processing') {
            actionHtml += '<div class="download-spinner"></div>';
          }

          return `
            <div class="file-item status-${f.status}">
              <span class="fi-status">${STATUS_ICON[f.status]}</span>
              <div class="fi-info">
                <div class="fi-name">${escapeHtml(f.file.name)}</div>
                <div class="fi-meta">${metaHtml}</div>
                ${f.status === 'processing' ? `
                <div class="fi-progress"><div class="fi-progress-fill" style="width:${f.progress || 0}%"></div></div>
                <div class="fi-status-text">${escapeHtml(f.progressText || '处理中…')}</div>` : ''}
                ${f.status === 'done' && f.mp3Blob ? `
                <div class="rename-row">
                  <span class="rename-label">重命名为</span>
                  <input class="rename-input" type="text" value="${escapeHtml(f.outputName)}" data-action="rename" data-id="${f.id}" placeholder="输入文件名...">
                </div>` : ''}
              </div>
              <div class="fi-actions">${actionHtml}</div>
            </div>
          `;
        }).join('');

        updateDropZone();
      }

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // ─── File list event delegation ───
      fileList.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const action = btn.dataset.action;
        const id = parseInt(btn.dataset.id);

        if (action === 'download') {
          const f = files.find(x => x.id === id);
          if (f && f.mp3Blob) {
            // Read current value from the rename input in case user hasn't blurred yet
            const input = fileList.querySelector(`input[data-action="rename"][data-id="${id}"]`);
            const outName = (input ? input.value.trim() : f.outputName) || f.outputName;
            downloadBlob(f.mp3Blob, outName);
          }
        } else if (action === 'remove') {
          removeFile(id);
        }
      });

      // ─── Rename input: update outputName on input ───
      fileList.addEventListener('input', (e) => {
        const input = e.target.closest('[data-action="rename"]');
        if (!input) return;
        const id = parseInt(input.dataset.id);
        const f = files.find(x => x.id === id);
        if (f) {
          f.outputName = input.value.trim() || f.outputName;
        }
      });

      function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      // ─── Events: drop zone click ───
      dropZone.addEventListener('click', () => fileInput.click());
      btnAddMore.addEventListener('click', (e) => {
        e.stopPropagation();
        fileInput.click();
      });

      // ─── Event: file input change ───
      fileInput.addEventListener('change', () => {
        const newFiles = Array.from(fileInput.files);
        addFiles(newFiles);
      });

      // ─── Events: drag & drop ───
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });
      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
      });
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const newFiles = Array.from(e.dataTransfer.files);
        addFiles(newFiles);
      });

      // ─── Clear all ───
      btnClearAll.addEventListener('click', (e) => {
        e.stopPropagation();
        clearAll();
      });

      // ─── Format selector ───
      document.getElementById('formatSelector').addEventListener('click', (e) => {
        const btn = e.target.closest('.format-option');
        if (!btn || isConverting) return;
        const fmt = btn.dataset.format;
        if (fmt === outputFormat) return;

        outputFormat = fmt;

        // Toggle active
        document.querySelectorAll('.format-option').forEach(b => b.classList.toggle('active', b.dataset.format === fmt));

        // Update pending file extensions (only pending ones)
        files.forEach(f => {
          if (f.status === 'pending' || f.status === 'error') {
            f.outputName = f.outputName.replace(/\.(mp3|wav)$/i, '') + '.' + fmt;
          }
        });

        renderFileList();
        showToast(`输出格式已切换为 ${fmt.toUpperCase()}`, 'info');
      });

      // ─── PCM to WAV encoding ───
      function writeStr(view, offset, str) {
        for (let i = 0; i < str.length; i++) {
          view.setUint8(offset + i, str.charCodeAt(i));
        }
      }

      function encodePCMtoWAV(audioBuffer, onProgress) {
        return new Promise((resolve) => {
          const sampleRate = audioBuffer.sampleRate;
          const channels = audioBuffer.numberOfChannels;
          const length = audioBuffer.length;
          const bitsPerSample = 16;
          const byteRate = sampleRate * channels * bitsPerSample / 8;
          const blockAlign = channels * bitsPerSample / 8;
          const dataLength = length * channels * (bitsPerSample / 8);

          const buffer = new ArrayBuffer(44 + dataLength);
          const view = new DataView(buffer);

          writeStr(view, 0, 'RIFF');
          view.setUint32(4, 36 + dataLength, true);
          writeStr(view, 8, 'WAVE');
          writeStr(view, 12, 'fmt ');
          view.setUint32(16, 16, true);
          view.setUint16(20, 1, true);
          view.setUint16(22, channels, true);
          view.setUint32(24, sampleRate, true);
          view.setUint32(28, byteRate, true);
          view.setUint16(32, blockAlign, true);
          view.setUint16(34, bitsPerSample, true);
          writeStr(view, 36, 'data');
          view.setUint32(40, dataLength, true);

          const chData = [];
          for (let ch = 0; ch < channels; ch++) {
            chData.push(audioBuffer.getChannelData(ch));
          }

          let offset = 44;
          const blockSize = 1152;
          const totalBlocks = Math.ceil(length / blockSize);

          for (let block = 0; block < totalBlocks; block++) {
            const start = block * blockSize;
            const end = Math.min(start + blockSize, length);
            for (let i = start; i < end; i++) {
              for (let ch = 0; ch < channels; ch++) {
                const s = Math.max(-32768, Math.min(32767, Math.round(chData[ch][i] * 32767)));
                view.setInt16(offset, s, true);
                offset += 2;
              }
            }
            const progress = Math.round((block / totalBlocks) * 100);
            onProgress(progress, '编码 WAV…');
          }

          resolve(new Blob([buffer], { type: 'audio/wav' }));
        });
      }

      // ─── PCM to MP3 encoding ───
      function encodePCMtoMP3(audioBuffer, onProgress) {
        return new Promise((resolve, reject) => {
          try {
            const sampleRate = audioBuffer.sampleRate;
            const channels = audioBuffer.numberOfChannels;
            const length = audioBuffer.length;
            const bitrate = channels >= 2 ? 128 : 64;

            const mp3encoder = new lamejs.Mp3Encoder(channels, sampleRate, bitrate);
            const sampleBlockSize = 1152;
            const mp3Chunks = [];

            const channelData = [];
            for (let ch = 0; ch < channels; ch++) {
              channelData.push(audioBuffer.getChannelData(ch));
            }

            const totalBlocks = Math.ceil(length / sampleBlockSize);

            for (let block = 0; block < totalBlocks; block++) {
              const start = block * sampleBlockSize;
              const end = Math.min(start + sampleBlockSize, length);
              const blockLen = end - start;

              if (channels === 1) {
                const left = new Int16Array(blockLen);
                for (let i = 0; i < blockLen; i++) {
                  const sample = channelData[0][start + i];
                  left[i] = Math.max(-32768, Math.min(32767, Math.round(sample * 32767)));
                }
                const mp3buf = mp3encoder.encodeBuffer(left);
                if (mp3buf.length > 0) mp3Chunks.push(mp3buf);
              } else {
                const left = new Int16Array(blockLen);
                const right = new Int16Array(blockLen);
                for (let i = 0; i < blockLen; i++) {
                  left[i]  = Math.max(-32768, Math.min(32767, Math.round(channelData[0][start + i] * 32767)));
                  right[i] = Math.max(-32768, Math.min(32767, Math.round(channelData[1][start + i] * 32767)));
                }
                const mp3buf = mp3encoder.encodeBuffer(left, right);
                if (mp3buf.length > 0) mp3Chunks.push(mp3buf);
              }

              const progress = Math.round((block / totalBlocks) * 100);
              onProgress(progress, '编码中…');
            }

            const endBuf = mp3encoder.flush();
            if (endBuf.length > 0) mp3Chunks.push(endBuf);

            const blob = new Blob(mp3Chunks, { type: 'audio/mpeg' });
            resolve(blob);
          } catch (err) {
            reject(err);
          }
        });
      }

      // ─── Convert a single file ───
      async function convertOneFile(fileObj, onProgress) {
        onProgress(5, '读取文件中…');
        const arrayBuffer = await fileObj.file.arrayBuffer();

        onProgress(15, '解码音频中…');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        let audioBuffer;
        try {
          audioBuffer = await audioCtx.decodeAudioData(arrayBuffer.slice(0));
        } catch (decodeErr) {
          onProgress(20, '尝试备用解码方案…');
          audioBuffer = await decodeViaVideoElement(fileObj.file, onProgress);
        }
        await audioCtx.close();

        const duration = audioBuffer.duration;
        const channels = audioBuffer.numberOfChannels;
        const isWav = outputFormat === 'wav';
        onProgress(30, `音频 ${Math.floor(duration)}s, ${channels}声道 · ${isWav ? '编码 WAV…' : '编码中…'}`);

        const audioBlob = isWav
          ? await encodePCMtoWAV(audioBuffer, (pct, text) => {
              const overall = 30 + Math.round(pct * 0.65);
              onProgress(overall, text);
            })
          : await encodePCMtoMP3(audioBuffer, (pct, text) => {
              const overall = 30 + Math.round(pct * 0.65);
              onProgress(overall, text);
            });

        onProgress(98, '完成');
        return audioBlob;
      }

      // ─── Fallback: decode via <video> ───
      async function decodeViaVideoElement(file, onProgress) {
        return new Promise((resolve, reject) => {
          const video = document.createElement('video');
          video.preload = 'auto';
          video.muted = true;
          video.playsInline = true;
          const url = URL.createObjectURL(file);
          video.src = url;

          video.onloadedmetadata = () => {
            onProgress(22, '备用方案: 提取音频…');
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(video);
            const dest = audioCtx.createMediaStreamDestination();
            source.connect(dest);
            source.connect(audioCtx.destination);

            const mediaRecorder = new MediaRecorder(dest.stream, {
              mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                ? 'audio/webm;codecs=opus' : 'audio/webm',
            });
            const chunks = [];

            mediaRecorder.ondataavailable = (e) => {
              if (e.data.size > 0) chunks.push(e.data);
            };

            mediaRecorder.onstop = async () => {
              URL.revokeObjectURL(url);
              video.remove();
              audioCtx.close();
              const audioBlob = new Blob(chunks, { type: 'audio/webm' });
              const arrayBuf = await audioBlob.arrayBuffer();
              const decodeCtx = new (window.AudioContext || window.webkitAudioContext)();
              try {
                const buffer = await decodeCtx.decodeAudioData(arrayBuf);
                await decodeCtx.close();
                resolve(buffer);
              } catch (e) {
                await decodeCtx.close();
                reject(new Error('备用解码也失败了'));
              }
            };

            mediaRecorder.onerror = () => {
              URL.revokeObjectURL(url);
              video.remove();
              audioCtx.close();
              reject(new Error('MediaRecorder 出错'));
            };

            mediaRecorder.start();
            video.play().catch(() => {});
            video.onended = () => { try { mediaRecorder.stop(); } catch (_) {} };
            setTimeout(() => {
              try { if (mediaRecorder.state !== 'inactive') mediaRecorder.stop(); } catch (_) {}
            }, (video.duration + 3) * 1000);
          };

          video.onerror = () => {
            URL.revokeObjectURL(url);
            video.remove();
            reject(new Error('无法加载视频文件'));
          };
        });
      }

      // ─── Convert all (batch) ───
      btnConvert.addEventListener('click', async () => {
        if (isConverting) return;

        const pending = files.filter(f => f.status === 'pending' || f.status === 'error');
        if (pending.length === 0) return;

        isConverting = true;
        btnConvert.disabled = true;
        btnConvert.innerHTML = '<span class="loading-text">⏳ 转换中…</span>';

        const totalPending = pending.length;
        let completed = 0;
        listCount.textContent = `转换中… ${completed}/${totalPending}`;

        for (let i = 0; i < pending.length; i++) {
          const fileObj = pending[i];
          fileObj.status = 'processing';
          fileObj.error = null;
          renderFileList();

          // Per-file progress
          const updateProgress = (pct, text) => {
            fileObj.progress = pct;
            fileObj.progressText = text;
            const overallPct = Math.round(((completed + pct / 100) / totalPending) * 100);
            if (pct % 15 === 1 || pct >= 98) {
              renderFileList();
              listCount.textContent = `转换中 ${overallPct}% · ${completed + 1}/${totalPending}`;
            }
          };

          try {
            updateProgress(0, '开始处理…');
            const audioBlob = await convertOneFile(fileObj, updateProgress);
            fileObj.mp3Blob = audioBlob;
            fileObj.convertedFormat = outputFormat;
            fileObj.status = 'done';
          } catch (err) {
            console.error('Conversion error:', err);
            fileObj.status = 'error';
            fileObj.error = err.message || '未知错误';
          }

          fileObj.progress = 100;
          completed++;
          renderFileList();
        }

        // All done
        isConverting = false;

        const doneCount = files.filter(f => f.status === 'done').length;
        const errCount = files.filter(f => f.status === 'error').length;

        let msg = `完成 ${doneCount} 个文件`;
        if (errCount > 0) msg += `，${errCount} 个失败`;
        showToast(msg, errCount > 0 ? 'error' : 'info');

        btnConvert.innerHTML = '🎵 重新转换';
        btnConvert.disabled = false;
        updateDropZone();
      });

      // ─── Initial state ───
      btnConvert.disabled = true;
    })();
  </script>
</body>
